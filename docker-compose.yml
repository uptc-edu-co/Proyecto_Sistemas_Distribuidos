services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=contracts_db
    volumes:
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vpc_private

  service-registry:
    build: ./service-registry
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - vpc_private

  api-gateway:
    build: ./gateway/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - dmz
      - vpc_private
    environment:
      - EUREKA_URL=http://service-registry:8761/eureka/
    depends_on:
      - service-registry

  ms-auth:
    build: ./ms-auth
    container_name: ms-auth
    env_file: .env
    environment:
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - vpc_private
    depends_on:
      - postgres
      - service-registry

  ms-contracts:
    build: ./ms-contracts
    container_name: ms-contracts
    env_file: .env
    environment:
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - vpc_private
    depends_on:
      - postgres
      - service-registry

  ms-suppliers:
    build: ./ms-suppliers
    container_name: ms-suppliers
    env_file: .env
    environment:
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - vpc_private
    depends_on:
      - postgres
      - service-registry

  ms-audit:
    build: ./ms-audit
    container_name: ms-audit
    ports:
      - "3000:3000"
    networks:
      - vpc_private
    depends_on:
      - service-registry

  elasticsearch_db:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch_db
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - vpc_private

networks:
  dmz:
  vpc_private:
