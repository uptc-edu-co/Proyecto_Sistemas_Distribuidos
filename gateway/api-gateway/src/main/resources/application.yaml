server:
  port: 8080

spring:
  application:
    name: api-gateway

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

zuul:
  routes:
    auth:
      path: /auth/**
      service-id: ms-auth
    contract:
      path: /contracts/**
      service-id: ms-contracts
    suppliers:
      path: /suppliers/**
      service-id: ms-suppliers
      