spring:
  application:
    name: ms-auth
  profiles:
    active: dev

server:
  port: ${SERVER_PORT:8081}

---
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET_BASE64:c3VwZXItc2VjcmV0LWtleS1mb3Itand0LW11c3QtYmUtMzItYnl0ZXMtbWluaW11bQ==}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

oauth2:
  google:
    client-id: ${OAUTH2_GOOGLE_CLIENT_ID:}
    client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${OAUTH2_GOOGLE_REDIRECT_URI:http://localhost:8081/auth/oauth2/callback/google}
    auth-uri: ${OAUTH2_GOOGLE_AUTH_URI:https://accounts.google.com/o/oauth2/v2/auth}
    token-uri: ${OAUTH2_GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
    user-info-uri: ${OAUTH2_GOOGLE_USERINFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
    scopes: ${OAUTH2_GOOGLE_SCOPES:openid email profile}
  post-login-redirect: ${OAUTH2_POST_LOGIN_REDIRECT:http://localhost:3000/oauth2/callback}